name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  smoke:
    name: smoke tests (python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (CPU-only torch)
        run: |
          python -m pip install --upgrade pip
          # Use the CPU-only PyTorch wheel index to avoid CUDA bloat in CI.
          pip install --index-url https://download.pytorch.org/whl/cpu "torch>=2.1,<3"
          pip install numpy>=1.24 scipy>=1.11 scikit-learn>=1.4 matplotlib>=3.8
          pip install -e .

      - name: Verify package import
        run: |
          python -c "import pcm; print('pcm', pcm.__version__)"
          python -c "from pcm import ConceptGraph, ParamBundle, ContextualizedConcept"
          python -c "from pcm.heads import ArithmeticHeadV2, ComparisonHead, NumerosityEncoder"

      - name: Run unit tests
        run: python -m unittest tests.test_smoke -v

      - name: Run domain smoke (phoneme — no encoder required)
        # ~25 s, 1 seed, reduced epochs
        run: python -m experiments.phoneme_concept_study --smoke --skip e2 e4
